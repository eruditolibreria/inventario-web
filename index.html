<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Inventario</title>

<style>

body{
margin:0;
background:linear-gradient(135deg,#000,#0f0f0f,#1a1a1a);
font-family:Arial;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px;
min-height:100vh;
color:white;
}

.panel{
background:#111;
width:100%;
max-width:420px;
padding:25px;
border-radius:14px;
box-shadow:0 0 25px rgba(0,255,150,0.2);
transition:0.3s;
}

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
margin:0;
font-size:22px;
color:#00e676;
}

.header span{
font-size:13px;
opacity:0.7;
}

select,input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:none;
background:#1b1b1b;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:none;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 10px #00e676;
}

button:active{
transform:scale(0.97);
}

.btn-ver{background:#2979ff;color:white;}

.oculto{display:none;}

.autocomplete{
background:#222;
border-radius:6px;
max-height:150px;
overflow-y:auto;
}

.item{
padding:8px;
cursor:pointer;
border-bottom:1px solid #333;
}

.item:hover{
background:#00c853;
color:black;
}

table{
width:100%;
font-size:13px;
border-collapse:collapse;
background:#1b1b1b;
}

td,th{
padding:6px;
border-bottom:1px solid #333;
text-align:center;
}

.eliminar{
cursor:pointer;
color:#ff5252;
}

#totalVenta{
font-size:22px;
font-weight:bold;
color:#00e676;
}

</style>
</head>

<body>

<div class="panel">

<div class="header">
<h1>📦 Sistema Inventario</h1>
<span>Grupo Eruditos</span>
</div>

<input id="password" type="password" placeholder="🔑 Contraseña acceso">

<select id="modo" onchange="cambiarModo()">
<option value="VENTA">Registrar Venta</option>
<option value="COMPRA">Registrar Compra</option>
<option value="BUSCAR">Buscar Producto</option>
</select>

<!-- ================== VENTAS ================== -->

<select id="sucursalVenta">
<option value="">🏪 Sucursal</option>
<option value="ERUDITOS">ERUDITOS</option>
<option value="CENTRAL">CENTRAL</option>
</select>

<div id="camposVenta">

<input id="usuarioVenta" placeholder="👤 Usuario">

<input id="productoVenta" placeholder="🔎 Producto" onkeyup="buscarProducto()">
<div id="listaProductos" class="autocomplete"></div>

<input id="cantidadVenta" type="number" placeholder="Cantidad">

<button onclick="agregarCarrito()" style="background:#00c853">Agregar al carrito</button>

<h3 id="tituloCarrito">🛒 Carrito (0)</h3>

<table>
<thead>
<tr>
<th>Producto</th>
<th>Cant</th>
<th>Precio</th>
<th>Total</th>
<th></th>
</tr>
</thead>

<tbody id="carrito"></tbody>
</table>

<h3>Total: <span id="totalVenta">Bs 0</span></h3>

<button onclick="cobrar()" style="background:#ff9800;font-size:17px">COBRAR</button>

</div>

<!-- ================== COMPRAS ================== -->

<select id="sucursalCompra" class="oculto">
<option value="">🏪 Sucursal</option>
<option value="ERUDITOS">ERUDITOS</option>
<option value="CENTRAL">CENTRAL</option>
</select>

<div id="camposCompra" class="oculto">

<input id="producto" placeholder="Producto" onkeyup="buscarProductoCompra()">
<div id="listaCompra" class="autocomplete"></div>

<select id="categoria">
<option value="">Categoría</option>
<option>GASTO FIJO</option>
<option>GASTO VARIABLE</option>
<option>GASTO OPERATIVO</option>
<option>GASTO ADMINISTRATIVO</option>
</select>

<input id="costo" type="number" placeholder="Costo paquete">
<input id="cantidadCompra" type="number" placeholder="Cantidad paquetes">
<input id="unidades" type="number" placeholder="Unidades paquete">
<input id="precioVenta" type="number" placeholder="Precio venta">
<input id="proveedor" placeholder="Proveedor">
<input id="fecha" type="date">
<input id="ubicacion" placeholder="Ubicación">

<button style="background:#00c853">Registrar Compra</button>

</div>

<!-- ================== BUSCADOR ================== -->

<div id="camposBuscar" class="oculto">

<input id="buscarProductoInput" placeholder="🔎 Buscar producto..." onkeyup="buscarDetalle()">

<div id="resultadoBusqueda"></div>

</div>

<button class="btn-ver" onclick="verInventario()">Ver Google Sheet</button>

</div>

<script>

const CLAVE="1234"

const baseURL="https://script.google.com/macros/s/AKfycbzBsX58dd3JAIOVqrgLyJHw4tjgP87rlZfPUMy75LTQcnxhmDYiN8tsQ1f8j1TqhGQLwQ/exec"

let inventarioGlobal=[]
let carrito=[]

function cambiarModo(){

const modo=document.getElementById("modo").value

document.getElementById("camposVenta").classList.toggle("oculto",modo!=="VENTA")
document.getElementById("camposCompra").classList.toggle("oculto",modo!=="COMPRA")
document.getElementById("camposBuscar").classList.toggle("oculto",modo!=="BUSCAR")

document.getElementById("sucursalVenta").classList.toggle("oculto",modo!=="VENTA")
document.getElementById("sucursalCompra").classList.toggle("oculto",modo!=="COMPRA")

}

async function cargarInventario(){

try{

const res=await fetch(baseURL+"?ACCION=LISTAR_INVENTARIO")
inventarioGlobal=await res.json()

}catch(e){}

}

function buscarProducto(){

const texto=document.getElementById("productoVenta").value.toLowerCase()
const sucursal=document.getElementById("sucursalVenta").value
const lista=document.getElementById("listaProductos")

lista.innerHTML=""

if(texto.length<1)return

const filtrados=inventarioGlobal.filter(p=>

p.producto.toLowerCase().includes(texto)
&& p.sucursal===sucursal

)

filtrados.slice(0,8).forEach(p=>{

const div=document.createElement("div")

div.className="item"
div.innerText=p.producto+" | Stock:"+p.stock+" | Bs "+p.precio

div.onclick=()=>{
document.getElementById("productoVenta").value=p.producto
lista.innerHTML=""
}

lista.appendChild(div)

})

}

function buscarProductoCompra(){

const texto=document.getElementById("producto").value.toLowerCase()
const lista=document.getElementById("listaCompra")

lista.innerHTML=""

if(texto.length<1)return

const filtrados=inventarioGlobal.filter(p=>
p.producto.toLowerCase().includes(texto)
)

filtrados.slice(0,8).forEach(p=>{

const div=document.createElement("div")

div.className="item"
div.innerText=p.producto

div.onclick=()=>{
document.getElementById("producto").value=p.producto
lista.innerHTML=""
}

lista.appendChild(div)

})

}

function agregarCarrito(){

const producto=document.getElementById("productoVenta").value
const cantidad=Number(document.getElementById("cantidadVenta").value)
const sucursal=document.getElementById("sucursalVenta").value

const prod=inventarioGlobal.find(p=>
p.producto===producto && p.sucursal===sucursal
)

if(!prod)return

carrito.push({
producto:producto,
precio:prod.precio,
cantidad:cantidad,
total:prod.precio*cantidad
})

renderCarrito()

}

function renderCarrito(){

const tabla=document.getElementById("carrito")
tabla.innerHTML=""

let total=0

carrito.forEach((item,i)=>{

total+=item.total

tabla.innerHTML+=`

<tr>
<td>${item.producto}</td>
<td>${item.cantidad}</td>
<td>${item.precio}</td>
<td>${item.total}</td>
<td class="eliminar" onclick="eliminarItem(${i})">X</td>
</tr>

`

})

document.getElementById("totalVenta").innerText="Bs "+total
document.getElementById("tituloCarrito").innerText="🛒 Carrito ("+carrito.length+")"

}

function eliminarItem(i){
carrito.splice(i,1)
renderCarrito()
}

async function cobrar(){

if(document.getElementById("password").value!==CLAVE){
alert("Contraseña incorrecta")
return
}

const sucursal=document.getElementById("sucursalVenta").value
const usuario=document.getElementById("usuarioVenta").value||"ADMIN"

for(const item of carrito){

await fetch(
baseURL+
"?ACCION=VENTA"+
"&PRODUCTO="+encodeURIComponent(item.producto)+
"&CANTIDAD="+item.cantidad+
"&SUCURSAL="+sucursal+
"&USUARIO="+usuario
)

}

carrito=[]
renderCarrito()
cargarInventario()

}

function buscarDetalle(){

const texto=document.getElementById("buscarProductoInput").value.toLowerCase()
const res=document.getElementById("resultadoBusqueda")

res.innerHTML=""

inventarioGlobal
.filter(p=>p.producto.toLowerCase().includes(texto))
.slice(0,10)
.forEach(p=>{

res.innerHTML+=`

<div style="padding:8px;border-bottom:1px solid #333">
<b>${p.producto}</b><br>
Sucursal: ${p.sucursal}<br>
Precio: Bs ${p.precio}<br>
Stock: ${p.stock}
</div>

`

})

}

function verInventario(){
window.open("TU_GOOGLE_SHEET")
}

cargarInventario()
cambiarModo()

</script>

</body>
</html>

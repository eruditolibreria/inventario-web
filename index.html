<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPRAS</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.panel {
  background: #111;
  color: white;
  width: 95%;
  max-width: 420px;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 0 20px rgba(0,255,150,0.2);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

input {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
  border: none;
  box-sizing: border-box;
  font-size: 14px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border-radius: 6px;
  border: none;
  font-weight: bold;
  cursor: pointer;
  font-size: 14px;
}

.btn-registrar { background: #00c853; color: black; }
.btn-ver { background: #2979ff; color: white; }
.btn-buscar { background: #ff9100; color: black; }

.mensaje {
  margin-top: 10px;
  padding: 8px;
  border-radius: 6px;
  text-align: center;
  display: none;
}

.exito { background: #1b5e20; }
.error { background: #b71c1c; }

.tabla {
  margin-top: 15px;
  max-height: 150px;
  overflow-y: auto;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="panel">

<h2>Inventario</h2>

<input id="password" type="password" placeholder="Contraseña acceso">

<input id="categoria" placeholder="Categoría">
<input id="producto" placeholder="Producto">
<input id="costo" type="number" placeholder="Costo Paquete">
<input id="cantidad" type="number" placeholder="Cantidad Paquetes">
<input id="unidades" type="number" placeholder="Unidades por Paquete">
<input id="precioVenta" type="number" placeholder="Precio Venta">
<input id="proveedor" placeholder="Proveedor">
<input id="fecha" type="date">
<input id="ubicacion" placeholder="Ubicación">
<input id="sucursal" placeholder="Sucursal">

<button class="btn-registrar" onclick="registrar()">Registrar</button>
<button class="btn-buscar" onclick="buscar()">Buscar Producto</button>
<button class="btn-ver" onclick="verInventario()">Ver Google Sheet</button>

<div id="mensaje" class="mensaje"></div>
<div class="tabla" id="resultadoBusqueda"></div>

</div>

<form id="formRegistro" method="GET" target="hiddenFrame" style="display:none;">
  <input type="hidden" name="CATEGORIA" id="f_categoria">
  <input type="hidden" name="PRODUCTO" id="f_producto">
  <input type="hidden" name="COSTO_PAQUETE" id="f_costo">
  <input type="hidden" name="CANTIDAD_PAQUETE" id="f_cantidad">
  <input type="hidden" name="UNIDADES_PAQUETE" id="f_unidades">
  <input type="hidden" name="PRECIO_VENTA" id="f_precioVenta">
  <input type="hidden" name="PROVEEDOR" id="f_proveedor">
  <input type="hidden" name="FECHA_ENTRADA" id="f_fecha">
  <input type="hidden" name="UBICACION_PRODUCTO" id="f_ubicacion">
  <input type="hidden" name="SUCURSAL" id="f_sucursal">
</form>

<iframe name="hiddenFrame" style="display:none;"></iframe>

<script>

const CLAVE = "1234";

function mostrarMensaje(texto, tipo) {
  const m = document.getElementById("mensaje");
  m.className = "mensaje " + tipo;
  m.innerText = texto;
  m.style.display = "block";
  setTimeout(()=> m.style.display="none", 3000);
}

function registrar() {

  if(document.getElementById("password").value !== CLAVE){
    mostrarMensaje("Contraseña incorrecta", "error");
    return;
  }

  const producto = document.getElementById("producto").value.trim();
  if(!producto){
    mostrarMensaje("Producto es obligatorio", "error");
    return;
  }

  const baseURL = "https://script.google.com/macros/s/AKfycbz3SkZXEzkLDDk0yC_A3DVzYOatPC_Ruojgi4vIQ_TS-gzPyqSUew5j5eNXetC67fpe_w/exec";
  document.getElementById("formRegistro").action = baseURL;

  document.getElementById("f_categoria").value = document.getElementById("categoria").value;
  document.getElementById("f_producto").value = producto;
  document.getElementById("f_costo").value = document.getElementById("costo").value;
  document.getElementById("f_cantidad").value = document.getElementById("cantidad").value;
  document.getElementById("f_unidades").value = document.getElementById("unidades").value;
  document.getElementById("f_precioVenta").value = document.getElementById("precioVenta").value;
  document.getElementById("f_proveedor").value = document.getElementById("proveedor").value;
  document.getElementById("f_fecha").value = document.getElementById("fecha").value;
  document.getElementById("f_ubicacion").value = document.getElementById("ubicacion").value;
  document.getElementById("f_sucursal").value = document.getElementById("sucursal").value;

  document.getElementById("formRegistro").submit();

  document.querySelectorAll(".panel input").forEach(i=>{
    if(i.id !== "password") i.value="";
  });

  mostrarMensaje("Registrado correctamente", "exito");
}

function buscar(){
  const texto = document.getElementById("producto").value;
  document.getElementById("resultadoBusqueda").innerHTML =
  "Búsqueda local: " + texto;
}

function verInventario(){
  window.open("https://docs.google.com/spreadsheets/d/1hpec74x28bmF8ECJSPqWHvajLo4Ibjk4w1xjBUiRT9c/edit", "_blank");
}

</script>

</body>
</html>

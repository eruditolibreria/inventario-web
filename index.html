<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Inventario</title>
</head>
<body>

<h2>Registrar Producto</h2>

<form id="formRegistro" method="GET" target="hiddenFrame">
  <input type="hidden" name="CATEGORIA" id="f_categoria">
  <input type="hidden" name="PRODUCTO" id="f_producto">
  <input type="hidden" name="COSTO_PAQUETE" id="f_costo">
  <input type="hidden" name="CANTIDAD_PAQUETE" id="f_cantidad">
  <input type="hidden" name="UNIDADES_PAQUETE" id="f_unidades">
  <input type="hidden" name="PRECIO_VENTA" id="f_precioVenta">
  <input type="hidden" name="PROVEEDOR" id="f_proveedor">
  <input type="hidden" name="FECHA_ENTRADA" id="f_fecha">
  <input type="hidden" name="UBICACION_PRODUCTO" id="f_ubicacion">
  <input type="hidden" name="SUCURSAL" id="f_sucursal">

<button onclick="registrar()">Registrar</button>

<script>
function registrar() {

  const baseURL = "https://script.google.com/macros/s/AKfycbz3SkZXEzkLDDk0yC_A3DVzYOatPC_Ruojgi4vIQ_TS-gzPyqSUew5j5eNXetC67fpe_w/exec";

  document.getElementById("formRegistro").action = baseURL;

  document.getElementById("f_categoria").value = document.getElementById("categoria").value;
  document.getElementById("f_producto").value = document.getElementById("producto").value;
  document.getElementById("f_costo").value = document.getElementById("costo").value;
  document.getElementById("f_cantidad").value = document.getElementById("cantidad").value;
  document.getElementById("f_unidades").value = document.getElementById("unidades").value;
  document.getElementById("f_precioVenta").value = document.getElementById("precioVenta").value;
  document.getElementById("f_proveedor").value = document.getElementById("proveedor").value;
  document.getElementById("f_fecha").value = document.getElementById("fecha").value;
  document.getElementById("f_ubicacion").value = document.getElementById("ubicacion").value;
  document.getElementById("f_sucursal").value = document.getElementById("sucursal").value;

  document.getElementById("formRegistro").submit();

  alert("Producto registrado correctamente");
}
</script>
  
</form>

<iframe id="hiddenFrame" name="hiddenFrame" style="display:none;"></iframe>
  
  <button onclick="verInventario()">Ver Inventario</button>
<script>
function verInventario() {
  window.open("https://docs.google.com/spreadsheets/d/1hpec74x28bmF8ECJSPqWHvajLo4Ibjk4w1xjBUiRT9c/edit?gid=992869814#gid=992869814", "_blank");
}
</script>
  
</body>

</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Inventario</title>

<style>

/* TU CSS ORIGINAL NO SE MODIFICA */

body{
margin:0;
background:linear-gradient(135deg,#000,#0f0f0f,#1a1a1a);
font-family:Arial;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px;
min-height:100vh;
color:white;
}

.panel{
background:#111;
width:100%;
max-width:420px;
padding:25px;
border-radius:14px;
box-shadow:0 0 25px rgba(0,255,150,0.2);
transition:0.3s;
}

.panel.ok{
box-shadow:0 0 35px #00ff9d;
transform:scale(1.02);
}

.header{
text-align:center;
margin-bottom:20px;
}

.header h1{
margin:0;
font-size:22px;
color:#00e676;
letter-spacing:1px;
}

.header span{
font-size:13px;
opacity:0.7;
}

select,input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:none;
box-sizing:border-box;
font-size:15px;
background:#1b1b1b;
color:white;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:none;
font-weight:bold;
cursor:pointer;
font-size:14px;
}

.btn-ver{background:#2979ff;color:white;}

.mensaje{
margin-top:10px;
padding:8px;
border-radius:6px;
text-align:center;
display:none;
}

.exito{background:#1b5e20;}
.error{background:#b71c1c;}

.oculto{display:none;}

.autocomplete{
background:#222;
border-radius:6px;
max-height:150px;
overflow-y:auto;
margin-top:-8px;
margin-bottom:10px;
}

.item{
padding:8px;
cursor:pointer;
border-bottom:1px solid #333;
}

.item:hover{
background:#00c853;
color:black;
}

.infoProducto{
font-size:13px;
opacity:0.9;
margin-top:-6px;
margin-bottom:10px;
}

.stockBajo{
color:#ff5252;
font-weight:bold;
}

table{
width:100%;
font-size:13px;
border-collapse:collapse;
background:#1b1b1b;
border-radius:8px;
overflow:hidden;
}

td,th{
padding:6px;
border-bottom:1px solid #333;
text-align:center;
}

th{
background:#222;
color:#00e676;
}

.eliminar{
cursor:pointer;
color:#ff5252;
}

.loader{
display:none;
margin:auto;
border:4px solid #333;
border-top:4px solid #00c853;
border-radius:50%;
width:30px;
height:30px;
animation:giro 0.7s linear infinite;
}

#totalVenta{
font-size:22px;
font-weight:bold;
color:#00e676;
}

@keyframes giro{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div class="panel" id="panel">

<div class="header">
<h1>📦 Sistema Inventario</h1>
<span>Grupo Eruditos</span>
</div>


<!-- ================================================= -->
<!-- NUEVO: LOGIN DE USUARIO CON BACKEND -->
<!-- ================================================= -->

<input id="usuarioLogin" placeholder="👤 Usuario">
<input id="password" type="password" placeholder="🔑 Contraseña">

<button onclick="login()" style="background:#00c853">Ingresar</button>


<!-- ================================================= -->
<!-- PANEL ADMINISTRADOR NUEVO -->
<!-- ================================================= -->

<div id="panelAdmin" class="oculto">

<select id="modo" onchange="cambiarModo()">
<option value="VENTA">Registrar Venta</option>
<option value="COMPRA">Registrar Compra</option>
<option value="GASTO">Registrar Gasto</option>
<option value="BUSCAR">Buscar Producto</option>
</select>


<!-- ========================== -->
<!-- INTERFAZ VENTA (TUYA) -->
<!-- ========================== -->

<select id="sucursalVenta">
<option value="">🏪 Sucursal</option>
<option value="ERUDITOS">ERUDITOS</option>
<option value="CENTRAL">CENTRAL</option>
</select>

<div id="camposVenta">

<input id="usuarioVenta" placeholder="👤 Usuario (opcional)">

<input id="productoVenta" placeholder="🔎 Producto" onkeyup="buscarProducto()">
<div id="listaProductos" class="autocomplete"></div>
<div id="infoProducto" class="infoProducto"></div>

<input id="cantidadVenta" type="number" placeholder="📦 Cantidad">

<button onclick="agregarCarrito()" style="background:#00c853">Agregar al carrito</button>

<h3 id="tituloCarrito">🛒 Carrito (0)</h3>

<table>
<thead>
<tr>
<th>Producto</th>
<th>Cant</th>
<th>Precio</th>
<th>Total</th>
<th></th>
</tr>
</thead>
<tbody id="carrito"></tbody>
</table>

<h3>Total: <span id="totalVenta">Bs 0</span></h3>

<div class="loader" id="loader"></div>

<button onclick="cobrar()" style="background:#ff9800;font-size:17px">COBRAR</button>

</div>


<!-- ========================== -->
<!-- INTERFAZ COMPRA (TUYA) -->
<!-- ========================== -->

<select id="sucursalCompra" class="oculto">
<option value="">🏪 Sucursal</option>
<option value="ERUDITOS">ERUDITOS</option>
<option value="CENTRAL">CENTRAL</option>
</select>

<div id="camposCompra" class="oculto">

<input id="producto" placeholder="🔎 Producto" onkeyup="buscarProductoCompra()">
<div id="listaCompra" class="autocomplete"></div>
<div id="infoCompra" class="infoProducto"></div>

<input id="categoria" placeholder="📂 Categoría">

<input id="costo" type="number" placeholder="Costo Paquete">
<input id="cantidadCompra" type="number" placeholder="Cantidad Paquetes">
<input id="unidades" type="number" placeholder="Unidades por Paquete">
<input id="precioVenta" type="number" placeholder="Precio Venta">
<input id="proveedor" placeholder="Proveedor">
<input id="fecha" type="date">
<input id="ubicacion" placeholder="Ubicación">

<button onclick="registrarCompra()" style="background:#00c853">Registrar Compra</button>

</div>


<!-- ================================================= -->
<!-- NUEVO: INTERFAZ GASTOS -->
<!-- ================================================= -->

<div id="camposGasto" class="oculto">

<input id="conceptoGasto" placeholder="Concepto">

<select id="categoriaGasto">
<option>GASTO FIJO</option>
<option>GASTO VARIABLE</option>
<option>GASTO OPERATIVO</option>
<option>GASTO ADMINISTRATIVO</option>
</select>

<input id="importeGasto" type="number" placeholder="Importe">
<input id="personaGasto" placeholder="Responsable">
<input id="fechaGasto" type="date">
<input id="notasGasto" placeholder="Notas">

<button onclick="registrarGasto()" style="background:#ff5252">Registrar Gasto</button>

</div>


<!-- ================================================= -->
<!-- NUEVO: BUSCAR PRODUCTO -->
<!-- ================================================= -->

<div id="camposBuscar" class="oculto">

<input id="buscarProductoInput" placeholder="Buscar producto">

<button onclick="buscarProductoDetalle()" style="background:#2979ff">Buscar</button>

<div id="resultadoBusqueda"></div>

</div>


<button class="btn-ver" onclick="verInventario()">Ver Google Sheet</button>

<div id="mensaje" class="mensaje"></div>

</div>

</div>

<script>

const baseURL="https://script.google.com/macros/s/AKfycbzBsX58dd3JAIOVqrgLyJHw4tjgP87rlZfPUMy75LTQcnxhmDYiN8tsQ1f8j1TqhGQLwQ/exec"

let inventarioGlobal=[]
let carrito=[]


/* ================================================= */
/* NUEVO: LOGIN */
/* ================================================= */

async function login(){

const usuario=document.getElementById("usuarioLogin").value
const pass=document.getElementById("password").value

const res=await fetch(
baseURL+
"?ACCION=LOGIN"+
"&USUARIO="+usuario+
"&PASSWORD="+pass
)

const data=await res.json()

if(data.ok){

document.getElementById("panelAdmin").classList.remove("oculto")

mostrarMensaje("Bienvenido "+data.usuario,"exito")

}else{

mostrarMensaje("Login incorrecto","error")

}

}


/* ================================================= */
/* TU CODIGO ORIGINAL NO SE MODIFICA */
/* ================================================= */

function mostrarMensaje(texto,tipo){

const m=document.getElementById("mensaje")
m.className="mensaje "+tipo
m.innerText=texto
m.style.display="block"

setTimeout(()=>m.style.display="none",3000)

}


/* ================================================= */
/* MODIFICADO: CAMBIAR MODO PARA NUEVAS SECCIONES */
/* ================================================= */

function cambiarModo(){

const modo=document.getElementById("modo").value

document.getElementById("camposVenta").classList.add("oculto")
document.getElementById("camposCompra").classList.add("oculto")
document.getElementById("camposGasto").classList.add("oculto")
document.getElementById("camposBuscar").classList.add("oculto")

if(modo==="VENTA"){

document.getElementById("camposVenta").classList.remove("oculto")

}

if(modo==="COMPRA"){

document.getElementById("camposCompra").classList.remove("oculto")

}

if(modo==="GASTO"){

document.getElementById("camposGasto").classList.remove("oculto")

}

if(modo==="BUSCAR"){

document.getElementById("camposBuscar").classList.remove("oculto")

}

}


/* ================================================= */
/* NUEVO: REGISTRAR GASTO */
/* ================================================= */

function registrarGasto(){

const url=
baseURL+
"?ACCION=REGISTRAR_GASTO"+
"&CONCEPTO="+encodeURIComponent(document.getElementById("conceptoGasto").value)+
"&CATEGORIA="+encodeURIComponent(document.getElementById("categoriaGasto").value)+
"&IMPORTE="+document.getElementById("importeGasto").value+
"&PERSONA="+encodeURIComponent(document.getElementById("personaGasto").value)+
"&FECHA="+document.getElementById("fechaGasto").value+
"&NOTAS="+encodeURIComponent(document.getElementById("notasGasto").value)

fetch(url)

mostrarMensaje("Gasto registrado","exito")

}


/* ================================================= */
/* NUEVO: BUSCAR PRODUCTO */
/* ================================================= */

async function buscarProductoDetalle(){

const texto=document.getElementById("buscarProductoInput").value

const res=await fetch(
baseURL+
"?ACCION=BUSCAR_PRODUCTO_DETALLE"+
"&PRODUCTO="+encodeURIComponent(texto)
)

const data=await res.json()

let html=""

data.forEach(p=>{

html+=`
<div style="margin-top:10px;border-bottom:1px solid #333;padding:8px">
<b>${p.producto}</b><br>
Sucursal: ${p.sucursal}<br>
Ubicación: ${p.ubicacion}<br>
Precio Compra: Bs ${p.precioCompra}<br>
Precio Venta: Bs ${p.precioVenta}<br>
Stock: ${p.stock}
</div>
`

})

document.getElementById("resultadoBusqueda").innerHTML=html

}

</script>

</body>
</html>

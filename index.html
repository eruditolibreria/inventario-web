<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Inventario</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
display:flex;
justify-content:center;
align-items:flex-start;
padding:20px;
min-height:100vh;
}

.panel{
background:#111;
color:white;
width:100%;
max-width:420px;
padding:25px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,255,150,0.2);
transition:0.3s;
}

.panel.ok{
box-shadow:0 0 30px #00ff9d;
transform:scale(1.02);
}

h2{
text-align:center;
margin-bottom:20px;
}

select,input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:6px;
border:none;
box-sizing:border-box;
font-size:15px;
}

button{
width:100%;
padding:12px;
margin-top:8px;
border-radius:6px;
border:none;
font-weight:bold;
cursor:pointer;
font-size:14px;
}

.btn-ver{background:#2979ff;color:white;}

.mensaje{
margin-top:10px;
padding:8px;
border-radius:6px;
text-align:center;
display:none;
}

.exito{background:#1b5e20;}
.error{background:#b71c1c;}

.oculto{display:none;}

.autocomplete{
background:#222;
border-radius:6px;
max-height:150px;
overflow-y:auto;
margin-top:-8px;
margin-bottom:10px;
}

.item{
padding:8px;
cursor:pointer;
border-bottom:1px solid #333;
}

.item:hover{
background:#00c853;
color:black;
}

.infoProducto{
font-size:13px;
opacity:0.8;
margin-top:-6px;
margin-bottom:10px;
}

table{
width:100%;
font-size:13px;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #333;
text-align:center;
}

.eliminar{
cursor:pointer;
color:#ff5252;
}

.loader{
display:none;
margin:auto;
border:4px solid #333;
border-top:4px solid #00c853;
border-radius:50%;
width:30px;
height:30px;
animation:giro 0.7s linear infinite;
}

@keyframes giro{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div class="panel" id="panel">

<h2>Inventario</h2>

<input id="password" type="password" placeholder="Contraseña acceso">

<select id="modo" onchange="cambiarModo()">
<option value="VENTA">Registrar Venta</option>
<option value="COMPRA">Registrar Compra</option>
</select>

<select id="sucursalVenta">
<option value="">Sucursal</option>
<option value="ERUDITOS">ERUDITOS</option>
<option value="CENTRAL">CENTRAL</option>
</select>

<select id="sucursalCompra" class="oculto">
<option value="">Sucursal</option>
<option value="ERUDITOS">ERUDITOS</option>
<option value="CENTRAL">CENTRAL</option>
</select>

<div id="camposVenta">

<input id="usuarioVenta" placeholder="Usuario (opcional)">

<input id="productoVenta" placeholder="Producto" onkeyup="buscarProducto()">
<div id="listaProductos" class="autocomplete"></div>
<div id="infoProducto" class="infoProducto"></div>

<input id="cantidadVenta" type="number" placeholder="Cantidad">

<button onclick="agregarCarrito()">Agregar al carrito</button>

<h3>Carrito</h3>

<table>
<thead>
<tr>
<th>Producto</th>
<th>Cant</th>
<th>Precio</th>
<th>Total</th>
<th></th>
</tr>
</thead>
<tbody id="carrito"></tbody>
</table>

<h3>Total: <span id="totalVenta">Bs 0</span></h3>

<div class="loader" id="loader"></div>

<button onclick="cobrar()" style="background:#ff9800">COBRAR</button>

</div>

<div id="camposCompra" class="oculto">

<input id="producto" placeholder="Producto" onkeyup="buscarProductoCompra()">
<div id="listaCompra" class="autocomplete"></div>
<div id="infoCompra" class="infoProducto"></div>

<input id="categoria" placeholder="Categoría">

<input id="costo" type="number" placeholder="Costo Paquete">
<input id="cantidadCompra" type="number" placeholder="Cantidad Paquetes">
<input id="unidades" type="number" placeholder="Unidades por Paquete">
<input id="precioVenta" type="number" placeholder="Precio Venta">
<input id="proveedor" placeholder="Proveedor">
<input id="fecha" type="date">
<input id="ubicacion" placeholder="Ubicación">

<button onclick="registrarCompra()" style="background:#00c853">Registrar Compra</button>

</div>

<button class="btn-ver" onclick="verInventario()">Ver Google Sheet</button>

<div id="mensaje" class="mensaje"></div>

</div>

<script>

const CLAVE="1234"
const baseURL="https://script.google.com/macros/s/AKfycbztsaSqd2OcNWFKxpn5AyoNj9l_WvwemwLPpZXI0nje9fuaFAq4K_p0_nYcXJNpPNjtXg/exec"

let inventarioGlobal=[]
let carrito=[]

const sonidoCaja=new Audio("https://actions.google.com/sounds/v1/cash_register/cash_register.ogg")

function mostrarMensaje(texto,tipo){

const m=document.getElementById("mensaje")
m.className="mensaje "+tipo
m.innerText=texto
m.style.display="block"

setTimeout(()=>m.style.display="none",3000)

}

function cambiarModo(){

const modo=document.getElementById("modo").value

document.getElementById("camposCompra")
.classList.toggle("oculto",modo==="VENTA")

document.getElementById("camposVenta")
.classList.toggle("oculto",modo==="COMPRA")

document.getElementById("sucursalCompra")
.classList.toggle("oculto",modo==="VENTA")

document.getElementById("sucursalVenta")
.classList.toggle("oculto",modo==="COMPRA")

}

async function cargarInventario(){
const res=await fetch(baseURL+"?ACCION=LISTAR_INVENTARIO")
inventarioGlobal=await res.json()
}

setInterval(cargarInventario,10000)

function buscarProducto(){

const texto=document.getElementById("productoVenta").value.toLowerCase()
const sucursal=document.getElementById("sucursalVenta").value
const lista=document.getElementById("listaProductos")

lista.innerHTML=""

if(texto.length<1)return

const filtrados=inventarioGlobal.filter(p=>
p.producto.toLowerCase().includes(texto)
&& p.sucursal===sucursal
)

filtrados.slice(0,8).forEach(p=>{

const div=document.createElement("div")
div.className="item"

div.innerText=p.producto+" | Stock:"+p.stock+" | Bs "+p.precio

div.onclick=()=>{

document.getElementById("productoVenta").value=p.producto
document.getElementById("infoProducto").innerText="Stock disponible: "+p.stock+" | Precio: Bs "+p.precio

lista.innerHTML=""

}

lista.appendChild(div)

})

}

function agregarCarrito(){

const producto=document.getElementById("productoVenta").value
const cantidad=Number(document.getElementById("cantidadVenta").value)
const sucursal=document.getElementById("sucursalVenta").value

if(!producto || !cantidad){
mostrarMensaje("Datos incompletos","error")
return
}

const prod=inventarioGlobal.find(p=>p.producto===producto && p.sucursal===sucursal)

if(!prod){
mostrarMensaje("Producto no encontrado","error")
return
}

if(prod.stock < cantidad){
mostrarMensaje("Stock insuficiente","error")
return
}

const item={
producto:producto,
precio:prod.precio,
cantidad:cantidad,
total:prod.precio*cantidad
}

carrito.push(item)

renderCarrito()

document.getElementById("productoVenta").value=""
document.getElementById("cantidadVenta").value=""

}

function renderCarrito(){

const tabla=document.getElementById("carrito")
tabla.innerHTML=""

let total=0

carrito.forEach((item,i)=>{

total+=item.total

tabla.innerHTML+=`
<tr>
<td>${item.producto}</td>
<td>${item.cantidad}</td>
<td>${item.precio}</td>
<td>${item.total}</td>
<td class="eliminar" onclick="eliminarItem(${i})">X</td>
</tr>
`

})

document.getElementById("totalVenta").innerText="Bs "+total

}

function eliminarItem(i){
carrito.splice(i,1)
renderCarrito()
}

async function cobrar(){

if(document.getElementById("password").value!==CLAVE){
mostrarMensaje("Contraseña incorrecta","error")
return
}

if(carrito.length===0){
mostrarMensaje("Carrito vacío","error")
return
}

const loader=document.getElementById("loader")
loader.style.display="block"

const sucursal=document.getElementById("sucursalVenta").value
const usuario=document.getElementById("usuarioVenta").value || "ADMIN"

for(const item of carrito){

const url=
baseURL+
"?ACCION=VENTA"+
"&PRODUCTO="+encodeURIComponent(item.producto)+
"&CANTIDAD="+item.cantidad+
"&SUCURSAL="+sucursal+
"&USUARIO="+usuario

await fetch(url)

}

loader.style.display="none"
sonidoCaja.play()

mostrarMensaje("✅ Venta registrada","exito")

carrito=[]
renderCarrito()

cargarInventario()

}

function verInventario(){

window.open(
"https://docs.google.com/spreadsheets/d/1hpec74x28bmF8ECJSPqWHvajLo4Ibjk4w1xjBUiRT9c/edit",
"_blank"
)

}

cargarInventario()

</script>

</body>
</html>
